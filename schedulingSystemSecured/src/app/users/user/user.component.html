<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-xl-10">
            <div class="card edit-card ">
                <div class="bg-white py-4 px-5">
                    <div class="d-flex justify-content-between align-items-center">
                        <h1 class="fw-bold text-color  mb-0" t>User Settings</h1>
                        <span class="badge bg-success-subtle text-color px-3 py-2 rounded-pill">
                            <i class="bi bi-shield-check me-1"></i> {{user.role}}
                        </span>
                    </div>
                </div>

                <div class="card-body p-5">
                    <form>
                        <div class="row readonly-summary p-3 mb-5 g-0 mx-0">
                            <div class="col-md-6 border-end-md py-2">
                                <div class="info-box">
                                    <span class="info-box-label" t>User Reference</span>
                                    <div class="info-box-content">
                                        <div class="icon-circle">
                                            <i class="bi bi-fingerprint"></i>
                                        </div>
                                        <span class="fw-bold fs-5">ID: {{user.id}}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6 py-2">
                                <div class="info-box">
                                    <span class="info-box-label" t>Managed By</span>
                                    <div class="info-box-content">
                                        <div class="icon-circle">
                                            <i class="bi bi-person-badge"></i>
                                        </div>
                                        <span class="fw-bold fs-5">
                                            <ng-container *ngIf="user.managedBy">
                                                {{ user.managedBy }}
                                            </ng-container>

                                            <span *ngIf="!user.managedBy" t>Direct Administration</span>
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="section-header">
                            <h5 class="section-title mb-3">
                                <i class="bi bi-info-circle text-color me-1"></i>
                                <span t>Personal Information</span>
                            </h5>
                        </div>
                        <div class="row g-4 mb-5">
                            <div class="col-md-6">
                                <label class="field-label" t>First Name</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input class="form-control" name="firstName" [(ngModel)]="user.firstName"
                                        placeholder="First name">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="field-label" t>Last Name</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input class="form-control" name="lastName" [(ngModel)]="user.lastName"
                                        placeholder="Last name">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="field-label" t>Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input class="form-control" name="email" [(ngModel)]="user.email"
                                        placeholder="email@example.com" t>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="field-label" t>Phone Number</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                    <input class="form-control" name="phoneNumber" [(ngModel)]="user.phoneNumber"
                                        placeholder="+1...">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="field-label" t>Date of Birth</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-calendar-event"></i></span>
                                    <input type="date" class="form-control" name="dateOfBirth"
                                        [(ngModel)]="user.dateOfBirth">
                                </div>
                            </div>
                            <div class="col-md-6" *ngIf="user.role === 'MANAGER' && self.role === 'ADMIN'">
                                <label class="field-label" t>Company</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-building"></i></span>
                                    <input type="text" class="form-control" name="nameCompany"
                                        [(ngModel)]="managerOptions.nameCompany">
                                </div>
                            </div>
                        </div>

                        <div *ngIf="self.role === 'ADMIN' && user.role === 'MANAGER'" class="mt-5">
                            <div class="d-flex align-items-center justify-content-between mb-3 px-1">
                                <div class="section-header mb-0 border-0">
                                    <h5 class="section-title mb-3">
                                        <i class="bi bi-credit-card text-color me-1"></i>
                                        <span t>Payment Details</span>
                                    </h5>
                                </div>
                                <button type="button" class="btn btn-sm btn-outline-success rounded-pill px-3"
                                    (click)="showManagerFields = !showManagerFields">

                                    <ng-container *ngIf="showManagerFields">
                                        <i class="bi bi-eye-slash me-1"></i>
                                        <span t>Hide details</span>
                                    </ng-container>

                                    <ng-container *ngIf="!showManagerFields">
                                        <i class="bi bi-pencil-square me-1"></i>
                                        <span t>Edit payment</span>
                                    </ng-container>
                                </button>
                            </div>

                            <div class="payment-container shadow-sm mx-0" *ngIf="showManagerFields">
                                <div class="row g-4">
                                    <div class="col-md-6">
                                        <label class="field-label" t>Amount</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
                                            <input type="number" class="form-control" name="ammountPaid"
                                                [(ngModel)]="managerOptions.ammountPaid">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="field-label" t>Active Until</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-calendar-check"></i></span>
                                            <input type="date" class="form-control" name="activeDate"
                                                [ngModel]="managerOptions.activeDate | date:'yyyy-MM-dd'"
                                                (ngModelChange)="managerOptions.activeDate = $event">
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <label class="field-label" t>Comments</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-chat-text"></i></span>
                                            <input type="text" class="form-control" name="comments"
                                                [(ngModel)]="managerOptions.comments"
                                                placeholder="Add any additional notes here..." t>
                                        </div>
                                    </div>

                                    <div class="col-12 mt-4">
                                        <div class="d-flex justify-content-end border-top pt-3">
                                            <button type="button" class="btn-edit px-4 shadow-sm fw-bold"
                                                (click)="saveManagerDetails()">
                                                <i class="bi bi-save me-2"></i>
                                                <span t>Update payment info only</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div
                            class="d-flex flex-wrap gap-3 justify-content-between align-items-center mt-5 pt-4 border-top">
                            <div class="d-flex gap-2">
                                <a *ngIf="user.id != 0 && user.id != tokenId" href="/users"
                                    class="btn-cancel px-4 fw-bold border"> <i class="bi bi-x-circle me-2"></i>
                                    <span t>Cancel</span> </a>
                                <a *ngIf="user.id != 0 && user.id == tokenId" href="/schedule"
                                    class="btn-cancel px-4 fw-bold border"> <i class="bi bi-x-circle me-2"></i>
                                    <span t>Cancel</span></a>
                            </div>

                            <div class="d-flex gap-2">
                                <button *ngIf="self.role == 'ADMIN'" (click)="openDialog(user.id)"
                                    class="btn btn-outline-secondary px-4 fw-bold">
                                    <i class="bi bi-key me-2"></i>
                                    <span t>Change password</span>
                                </button>

                                <button *ngIf="user.id == 0" (click)="createUser()"
                                    class="btn btn-success px-5 fw-bold shadow-sm ">
                                    <span t>Create Account</span>
                                </button>
                                <button *ngIf="user.id != 0 && user.id != tokenId" (click)="editUser()"
                                    class="btn-edit px-5 fw-bold shadow-sm ">
                                    <i class="bi bi-floppy me-2"></i>
                                    <span t>Save changes</span>
                                </button>
                                <button *ngIf="user.id != 0 && user.id == tokenId" (click)="editSelf()"
                                    class="btn-edit px-5 fw-bold shadow-sm ">
                                    <i class="bi bi-floppy me-2"></i>
                                    <span t>Update my profile</span>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div class="row" *ngIf="message != ''">
        <div class="col-sm-12">
            <div class="alert alert-{{messageType}}" role="alert">{{message}}</div>
        </div>
    </div>
</div>
