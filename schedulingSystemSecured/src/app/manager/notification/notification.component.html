<div class="center-container">
  <div *ngIf="isLoading; else content" class="loader" t>
    Loading your notification preferences...
  </div>

  <ng-template #content>
    <div class="wrapper-layout">

      <div class="notification-card">
        <h3 t>Notification Settings</h3>
        <p class="instruction-text">
          <span t>Uncheck the boxes to</span>
          <strong t>disable</strong>
          <span t>the following notifications if you do not wish to receive them.</span>
        </p>
        <div class="options-grid">
          <label class="checkbox-container">
            <input type="checkbox" [formControl]="appointmentStatusChanges" [checked]="appointmentStatusChanges.value">
            <span class="custom-checkbox"></span>
            <span class="label-text" t>Notify end users of appointment status changes</span>
          </label>

          <label class="checkbox-container">
            <input type="checkbox" [formControl]="paymentRunsOut">
            <span class="custom-checkbox"></span>
            <span class="label-text" t>Automated notifications (Payment reminders 5 or 1 day before)</span>
          </label>

          <label class="checkbox-container">
            <input type="checkbox" [formControl]="appointmentCreated">
            <span class="custom-checkbox"></span>
            <span class="label-text" t>Notify me when a new appointment is scheduled</span>
          </label>

          <label class="checkbox-container">
            <input type="checkbox" [formControl]="appointmentTimeManager">
            <span class="custom-checkbox"></span>
            <span class="label-text" t>Please notify me 5 minutes before the appointment, to remind me that I have an
              appointment.</span>
          </label>

          <label class="checkbox-container">
            <input type="checkbox" [formControl]="appointmentTimeUser">
            <span class="custom-checkbox"></span>
            <span class="label-text" t>Notify the client 5 minutes before the appointment, to remind them that they have
              an appointment.</span>
          </label>
        </div>

        <p class="legend-text">
          <small><i t>Note: If you wish to re-enable any notification, simply check the corresponding box.</i></small>
        </p>

        <button (click)="savePreference()" class="btn-save" [disabled]="emailEnabled.pristine && appointmentStatusChanges.pristine && paymentRunsOut.pristine && appointmentCreated.pristine
            && appointmentTimeManager.pristine && appointmentTimeUser.pristine" t>
          Update Preferences
        </button>
      </div>

      <div *ngIf="message"
        [class]="'alert ' + messageClass + ' alert-dismissible fade show mt-3 d-flex align-items-center'" role="alert">
        <i class="bi me-2" [class.bi-check-circle-fill]="messageClass === 'alert-success'"
          [class.bi-exclamation-triangle-fill]="messageClass === 'alert-danger'">
        </i>
        <div t>
          {{ message }}
        </div>

      </div>

    </div>
  </ng-template>
</div>
