<div class="numberCompany-container px-3">
    <div class="numberCompany-card shadow-sm">

        <div class="numberCompany-header">
            <div class="d-flex align-items-center">
                <div class="bg-success text-white rounded-circle p-2 me-3 d-flex align-items-center justify-content-center"
                    style="width: 35px; height: 35px;">
                    <i class="bi bi-whatsapp"></i>
                </div>
                <h5 class="numberCompany-title mb-0">WhatsApp configuration for companies</h5>
            </div>
        </div>

        <div class="card-body p-4">

            <div class="mb-4">
                <label class="numberCompany-label ">
                    <span><i class="bi bi-building-fill me-2"></i>Select Company </span> </label>
                <select class="form-select form-select-md py-2" [(ngModel)]="selectedManagerId"
                    (change)="onCompanySelected()">
                    <option [ngValue]="null">Choose a company...</option>
                    <option *ngFor="let item of companies" [ngValue]="item.managerId">
                        {{ item.companyName }}
                    </option>
                </select>
            </div>

            <div *ngIf="selectedManagerId" class="animate-in">
                <hr class="my-4 text-muted opacity-25">
                <label class="numberCompany-label">Display Phone Number</label>
                <div class="input-group mb-3">
                    <select class="form-select flex-grow-0" style="width: 110px;" [(ngModel)]="selectedPrefix"
                        (change)="onPrefixChange()">
                        <option *ngFor="let c of countries" [value]="c.code">{{ c.flag }} +{{ c.code }}</option>
                    </select>
                    <input type="text" class="form-control form-control-lg" [(ngModel)]="localNumber"
                        (input)="formatNumber()" (keypress)="onlyNumbers($event)"
                        [maxlength]="selectedCountry?.len || 20"
                        [placeholder]="'Introduce ' + (selectedCountry?.len || '') + ' dígitos'">
                </div>

                <div class="p-3 bg-light rounded border mb-4">
                    <h6 class="numberCompany-title mb-3"><i class="bi bi-code-slash me-2"></i>WhatsApp Cloud API
                        Credentials
                    </h6>

                    <div class="mb-3">
                        <label class="small fw-bold numberCompany-label">Access Token </label>
                        <textarea class="form-control" [(ngModel)]="accessToken" rows="2"
                            placeholder="EAAB..."></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="small fw-bold numberCompany-label">Phone Number Identifier</label>
                            <input type="text" class="form-control" [(ngModel)]="phoneNumberId"
                                placeholder="Ej: 106554321...">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="small fw-bold numberCompany-label">WhatsApp Business Account ID</label>
                            <input type="text" class="form-control" [(ngModel)]="wabaId"
                                placeholder="Ej: 1122334455...">
                        </div>
                    </div>

                    <div class="mb-0">
                        <label class="small fw-bold numberCompany-label">Verification Token (Webhook)</label>
                        <input type="text" class="form-control" [(ngModel)]="verifyToken"
                            placeholder="Define a secret string for your webhook">
                    </div>
                </div>

                <button class="btn-numberCompany w-100 py-3" (click)="save()" [disabled]="!isNumberValid() || loading">
                    <span>{{ loading ? 'Saving...' : 'Save All Changes' }}</span>
                </button>
            </div>
            <div *ngIf="message"
                [class]="'alert ' + messageClass + ' alert-dismissible fade show d-flex align-items-center animate-in mb-3'"
                role="alert">
                <i class="bi me-2"
                    [ngClass]="messageClass === 'alert-success' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'"></i>
                <div>{{ message }}</div>
                <button type="button" class="btn-close shadow-none" (click)="message = null"
                    aria-label="Close"></button>
            </div>

            <div *ngIf="!selectedManagerId" class="text-center py-5">

                <i class="bi bi-building-gear display-4 opacity-25"></i>
                <p class="text-muted fw-medium">Select a manager from the list to<br>create or edit the number</p>
            </div>

        </div>
    </div>
</div>
